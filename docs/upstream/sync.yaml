# Upstream Sync State
#
# Tracks the last-reviewed and last-ported release tag per upstream package.
# Updated during every sync session. See README.md in this directory for the
# session workflow.
#
# Top-level keys are gh repo slugs (what `gh --repo` expects).
#
# Fields:
#   url               — GitHub URL, for humans
#   last_reviewed_tag — newest release tag fully walked (every PR classified)
#   last_ported_tag   — newest release where every PR was ported or intentionally
#                       skipped (nothing deferred pending work). Stays behind
#                       last_reviewed_tag when anything is deferred.
#   last_session      — date (YYYY-MM-DD) of the most recent session that
#                       touched this entry
#   notes             — free-form. Reference <package>.md here when a
#                       divergence doc exists (e.g. "See laravel-framework.md").
#
# Tags are `null` until the first session backfills them to reflect what
# Hypervel currently ships for each package.

inertiajs/inertia-laravel:
  url: https://github.com/inertiajs/inertia-laravel
  last_reviewed_tag: null
  last_ported_tag: null
  last_session: null
  notes: null

